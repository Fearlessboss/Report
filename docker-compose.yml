version: "3.9"

services:
  illegal-detector-bot:
    build: .
    container_name: illegal_detector_bot
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
      # Agar tu env variables se token/keys pass karna chahe:
      # - BOT_TOKEN=${BOT_TOKEN}
      # - API_ID=${API_ID}
      # - API_HASH=${API_HASH}
      # - OWNER_ID=${OWNER_ID}
    volumes:
      - ./data:/app/data            # session + sudo_users.json persist
      - ./logs:/app/logs            # logs persist
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
